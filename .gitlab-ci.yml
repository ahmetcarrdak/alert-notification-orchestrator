stages:
  - build
  - test
  - docker
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# --- BUILD ---
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore src/AlertNotificationService.API/AlertNotificationService.API.csproj
    - dotnet build src/AlertNotificationService.API/AlertNotificationService.API.csproj -c Release --no-restore
  artifacts:
    paths:
      - src/**/bin/
      - src/**/obj/
    expire_in: 1 hour

# --- TEST ---
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  needs:
    - build
  script:
    - dotnet test --no-build -c Release --logger "junit;LogFilePath=results.xml" || true
  artifacts:
    when: always
    reports:
      junit: "**/results.xml"
    expire_in: 7 days

# --- DOCKER BUILD & PUSH ---
docker:
  stage: docker
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# --- DEPLOY ---
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull api &&
        docker compose up -d --no-deps api &&
        docker network connect alert-notification-service_default alertmanager || true
      "
  only:
    - main
  when: manual
  environment:
    name: production
